spring:
  application:
    name: saas-ticket-system
  datasource:
    url: ${SAAS_DB_URL:jdbc:mysql://localhost:3306/saas_ticket_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${SAAS_DB_USERNAME:root}
    password: ${SAAS_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true

server:
  port: ${SAAS_SERVER_PORT:8080}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID

logging:
  level:
    com.saas: info
